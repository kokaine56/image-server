{% extends "base.html" %}

{% block title %}Error {{ error_code }} - TGCloud{% endblock %}

{% block content %}
<div class="glass-card max-w-md w-full p-8 flex flex-col items-center text-center gap-6 relative z-10">
    <div class="w-16 h-16 rounded-full bg-rose-500/10 border border-rose-500/20 flex items-center justify-center text-rose-500 text-3xl">
        <i class="fa-solid fa-circle-exclamation"></i>
    </div>
    
    <div>
        <h1 class="font-outfit text-3xl font-bold tracking-wide text-white mb-2">Error {{ error_code }}</h1>
        <p class="text-sm text-[#94A3B8] leading-relaxed">{{ message }}</p>
    </div>

    <a href="/" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl text-sm font-semibold transition-all shadow-lg shadow-indigo-600/10 mt-2">
        Return Home
    </a>
</div>
{% endblock %}
